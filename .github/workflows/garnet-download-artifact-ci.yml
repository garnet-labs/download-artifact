name: Garnet download-artifact CI
on:
  workflow_dispatch:
jobs:
  dep-install:
    name: Dependency Install (Garnet)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Garnet Runtime Visibility
        uses: garnet-org/action@v2.0.2
        with:
          api_token: ${{ secrets.GARNET_API_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
